services:
  mongodb:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=sayq
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - JWT_SECRET=${JWT_SECRET}
      - RL_SERVICE_URL=http://ml:8000
      - DQN_SERVICE_URL=http://ml:8001
    env_file:
      - ./backend/.env
    ports:
      - "6969:5000"
    volumes:
      - ./backend:/app:delegated
    networks:
      - app-net

  ml:
    build:
      context: ./ml_agent
      dockerfile: Dockerfile
    environment:
      - PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./ml_agent:/app:delegated
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - VITE_API_BASE_URL=https://sayq-newa.sauravdhoju.com.np
    ports:
      - "8080:80"
    depends_on:
      - backend
      - ml
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  mongodb_data:
